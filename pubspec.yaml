name: notes_tech
description: "Notes Tech — notes Markdown chiffrées avec coffres par dossier, IA on-device (Gemma + Whisper) et backlinks. 100 % local, zéro permission Internet."
publish_to: 'none'
version: 1.0.8+39

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State / DI
  provider: ^6.1.2

  # Storage : sqflite_sqlcipher embarque sa propre SQLite (avec FTS5),
  # contrairement au sqflite "vanilla" qui dépend du SQLite système Android
  # — certains OEM (Samsung) compilent SQLite sans FTS5.
  # Le chiffrement at-rest (Argon2id KEK + clé scellée Keystore) sera
  # activé en v0.5 avec le vault.
  sqflite_sqlcipher: ^3.1.0
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # IA on-device
  onnxruntime: ^1.4.1
  flutter_gemma: ^0.14.5
  file_picker: ^10.3.3

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.0
  crypto: ^3.0.5

  # Sécurité v0.5 — KEK 32 octets stockée via flutter_secure_storage,
  # clé maître scellée par AndroidKeystore (hardware-backed sur S24+).
  # v0.9.10 : migration 9.x → 10.x. Le backend 9.x (EncryptedSharedPreferences /
  # Jetpack Crypto) est déprécié et non maintenu. La 10.x utilise ses propres
  # ciphers (RSA-OAEP wrap + AES-256-GCM contenu) avec migration AUTOMATIQUE
  # depuis 9.x via `migrateOnAlgorithmChange: true` (défaut).
  # ⚠️ NE PAS bumper vers 11.x sans tester explicitement la persistance de
  # la KEK SQLCipher : v11 retirera complètement le backend ESP, donc tout
  # device qui n'aurait pas migré depuis 9.x perdrait sa KEK → notes illisibles.
  # Avant v11 : ajouter un test E2E ou forcer un boot intermédiaire en 10.x.
  flutter_secure_storage: ^10.0.0


  # v0.6 — Speech-to-Text on-device (Whisper) via package partagé sibling.
  # Pas de permission INTERNET ajoutée : l'utilisateur importe le modèle
  # .bin manuellement (cf. VoiceSetupScreen), même pattern que Gemma.
  files_tech_voice:
    path: ../files_tech_voice

  # v0.9.7 — Helpers crypto partagés (SecretBytes : randomBytes, wipe,
  # constantTimeEq) factorisés depuis pass_tech / read_files_tech.
  files_tech_core:
    path: ../files_tech_core

  # v0.8 — Vault par dossier (Argon2id passphrase + AES-256-GCM par note).
  # Le package `cryptography` (Dart pur, pas de natif additionnel)
  # fournit Argon2id RFC 9106 et AesGcm via `package:cryptography/dart.dart`.
  # On garde la constante `crypto: ^3.0.5` pour le SHA-256 streaming
  # (vérification modèles ML, hash export) — usages distincts.
  cryptography: ^2.7.0

  # Lancer une URL HuggingFace dans le navigateur système (option B du
  # flow voix v0.6) : c'est Chrome/Firefox/Brave qui télécharge le .bin
  # dans `/Downloads/`, l'app n'a JAMAIS la permission INTERNET. Notes
  # Tech ne fait que demander à l'OS d'ouvrir un lien.
  url_launcher: ^6.3.0

  # v0.7 — Export Markdown (sortie de secours, portabilité des notes).
  # `share_plus` ouvre le sheet de partage Android pour transmettre le
  # fichier (.md ou .zip) à n'importe quelle app : Drive, mail, USB, etc.
  # `archive` produit un ZIP pure-Dart (pas de natif), arborescence
  # par dossier conservée. Pas de permission Internet : c'est l'OS qui
  # gère le transfert via Intent.
  share_plus: ^10.0.0
  archive: ^4.0.0

  # v1.0 — Markdown rendu pour les pages légales (PRIVACY.{fr,en}.md,
  # TERMS.{fr,en}.md). Identique aux autres apps Files Tech.
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  image: ^4.3.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#262660"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/app_icon.png
    - assets/models/all-MiniLM-L6-v2-quant.onnx
    - assets/models/tokenizer.json
    - assets/legal/
