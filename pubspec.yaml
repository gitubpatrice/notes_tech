name: notes_tech
description: "Notes Tech — private notes with on-device AI (RAG + Q&A + backlinks, 100% offline)."
publish_to: 'none'
version: 0.6.0+12

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State / DI
  provider: ^6.1.2

  # Storage : sqflite_sqlcipher embarque sa propre SQLite (avec FTS5),
  # contrairement au sqflite "vanilla" qui dépend du SQLite système Android
  # — certains OEM (Samsung) compilent SQLite sans FTS5.
  # Le chiffrement at-rest (Argon2id KEK + clé scellée Keystore) sera
  # activé en v0.5 avec le vault.
  sqflite_sqlcipher: ^3.1.0
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # IA on-device
  onnxruntime: ^1.4.1
  flutter_gemma: ^0.14.5
  file_picker: ^10.3.3

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  crypto: ^3.0.5

  # Sécurité v0.5 — KEK 32 octets stockée dans EncryptedSharedPreferences
  # côté Android (clé maître scellée par AndroidKeystore, hardware-backed).
  flutter_secure_storage: ^9.2.2

  # NB : flutter_secure_storage / cryptography / local_auth seront ajoutés
  # quand le vault Argon2id+AES-GCM sera implémenté (v0.5).

  # v0.6 — Speech-to-Text on-device (Whisper) via package partagé sibling.
  # Pas de permission INTERNET ajoutée : l'utilisateur importe le modèle
  # .bin manuellement (cf. VoiceSetupScreen), même pattern que Gemma.
  files_tech_voice:
    path: ../files_tech_voice

  # Lancer une URL HuggingFace dans le navigateur système (option B du
  # flow voix v0.6) : c'est Chrome/Firefox/Brave qui télécharge le .bin
  # dans `/Downloads/`, l'app n'a JAMAIS la permission INTERNET. Notes
  # Tech ne fait que demander à l'OS d'ouvrir un lien.
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  image: ^4.3.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  # Adaptive icon : on utilise le master COLORÉ comme foreground, pas
  # un foreground texte-seul transparent. Sinon les launchers Android
  # appliquent un inset de 16% sur un texte qui devient minuscule, et
  # ne montrent que le fond — l'icône paraît "noire". Le master
  # contient déjà ses propres quadrants bleu/rouge ; le background
  # reste un fallback neutre seulement visible aux coins arrondis.
  adaptive_icon_background: "#262660"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/models/all-MiniLM-L6-v2-quant.onnx
    - assets/models/tokenizer.json
