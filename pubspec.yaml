name: notes_tech
description: "Notes Tech — private notes with on-device AI."
publish_to: 'none'
version: 0.3.1+6

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State / DI
  provider: ^6.1.2

  # Storage
  sqflite: ^2.4.0
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # IA on-device
  onnxruntime: ^1.4.1
  flutter_gemma: ^0.14.5
  file_picker: ^10.3.3

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0

  # NB : flutter_secure_storage / cryptography / local_auth seront ajoutés
  # quand le vault Argon2id+AES-GCM sera implémenté (v0.4).
  # flutter_markdown / markdown viendront avec la preview WYSIWYG (v0.2).

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/all-MiniLM-L6-v2-quant.onnx
    - assets/models/tokenizer.json
