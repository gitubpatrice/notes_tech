org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# v1.0.7 perf L5 — R8 full mode : optimisations agressives (inlining
# cross-classes, propagation de constantes, dead code elimination plus
# poussée). Gain typique 5-15 % sur la taille DEX et perf cold start
# mesurable. Compatible avec les règles ProGuard existantes.
android.enableR8.fullMode=true
