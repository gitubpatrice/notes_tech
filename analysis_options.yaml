# Configuration analyseur Dart pour Notes Tech.
#
# Politique : règles strictes par défaut, l'utilisateur n'écrivant pas de
# code lui-même, toute facilité du linter est utile pour Claude.

include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - tool/**
    - build/**
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Toute fuite d'awaitable est une erreur — clé pour les services
    # asynchrones (indexation, embedder, vault à venir).
    unawaited_futures: error
    # Les commentaires TODO ne doivent pas survivre à un commit.
    todo: warning

linter:
  rules:
    - prefer_single_quotes
    - require_trailing_commas
    - unawaited_futures
    - prefer_final_locals
    - prefer_const_constructors
    - prefer_const_declarations
    - avoid_dynamic_calls
    - cancel_subscriptions
    - close_sinks
    - directives_ordering
    - sort_child_properties_last
    - use_build_context_synchronously
